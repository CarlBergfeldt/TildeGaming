name: Build, Test, and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build_and_test:
    name: Build and Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore TildeGaming.sln

      - name: Build
        run: dotnet build TildeGaming.sln --configuration Release --no-restore

      - name: Test (if test projects exist)
        shell: pwsh
        run: |
          $testProjects = Get-ChildItem -Recurse -Filter *.csproj | Where-Object {
            Select-String -Path $_.FullName -Pattern 'Microsoft\.NET\.Test\.Sdk' -Quiet
          }

          if (-not $testProjects) {
            Write-Host "No test projects found. Skipping tests."
            exit 0
          }

          foreach ($project in $testProjects) {
            Write-Host "Running tests for $($project.FullName)"
            dotnet test $project.FullName --configuration Release --no-build --verbosity normal
          }

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build_and_test
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish
        run: dotnet publish HorseRunner/HorseRunner.csproj --configuration Release --output publish

      - name: Package release artifact
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path publish\* -DestinationPath "HorseRunner-$tag.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: HorseRunner-${{ github.ref_name }}.zip
          generate_release_notes: true
